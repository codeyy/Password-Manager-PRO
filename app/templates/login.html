{% extends "logedout-layout.html" %}
{% block main %}

<nav>
    <span></span>
    <a href="/register" class="form-button" style="text-decoration: none; float: right; margin-right: 6vw">Register</a>
</nav>

<form action="/login" method="post" class="reg_form">
    
    <input type="text" placeholder="Username" id="log-username" name="username" class="form-input" autocomplete="off"><br><br>

    <input type="password" placeholder="Password" id="log-password" name="password" class="form-input" autocomplete="off">

    <span id="toggle-log-Password" class="toggle-password" style="top: 42%;">Show</span>

    <br><br><br>

    <input type="submit" value="Login" class="form-button" id="log-submit">
</form>
{% if error %}
<div id="indc" class="indcglassmorphicpopup" style="border: 1px solid red;">
    <h2 class="indch">{{error}}</h2>
</div>
{% endif %}
<script src="../static/js/login.js" defer ></script>
{% endblock %}
