{% extends "layout.html" %}
{% block main %}

<!-- Navigation Bar -->
<nav>
    <span></span>
    <div>
        <a href="/" class="top-buttons" style="text-decoration: none;">Home</a>
        <button id="helper_key" class="top-buttons" style="text-decoration: none; font-size: 15px;">Help</button>
    </div>
</nav>

<!-- Password Input Section -->
<div class="reg_form">
    <br><br>
    <label class="pass-label">Strength Test Your Password: </label>
    <br><br>
    
    <!-- Password Input Field -->
    <input 
        type="password" 
        id="ps_check_password" 
        name="password"
        placeholder="Your login Password" 
        class="form-input" 
        autocomplete="off" 
        autofocus 
        required 
        title="Enter password to strength test it">
    
    <!-- Toggle Password Visibility -->
    <span id="ps-toggle-Password" class="toggle-password" style="top: 52.6%;">Show</span>
    
    <br>
    
    <!-- Progress Bar Container -->
    <div class="progress-container ease-out">
        <div class="progress-bar" id="ps-progressBar" style="width: 0%;"></div>
    </div>
</div>

<!-- Results Display Section -->
<div id="ps_glass_shell">
    <div>
        <!-- Entropy Display -->
        <p id="ps_entropy" style="z-index: 100000;"></p>
        <!-- Crack Time Display -->
        <p id="ps_crackTime" style="z-index: 100000;"></p>
    </div>
</div>

<!-- Password Strength Checker Script -->
<script src="../static/js/password_strength.js" defer></script>

{% endblock %}
