{% extends "layout.html" %}
{% block main %}

<nav>
    <span></span>
    <div>
        <a href="/" class="top-buttons" style="text-decoration: none; ">Home</a>
        <button id="helper_key" class="top-buttons" style="text-decoration: none; font-size: 15px">Help</button>
    </div>
</nav>

<div class="reg_form">
    <input type="password" placeholder="Your login Password" id="ps_check_password" name="password"
    required class="form-input" autocomplete="off" autofocus
    title="enter passwords to strength test it">
    
    <span id="ps-toggle-Password" class="toggle-password" style="top: 30%;">Show</span>
    <br>
    <div class="progress-container ease-out">
      <div class="progress-bar" style="width: 0%" id="ps-progressBar">
      </div>
    </div>
</div>
<div class="" id="ps_glass_shell">
    <div>
        <p id="ps_entropy"   style="z-index: 100000;">        </p>
        <p id="ps_crackTime" style="z-index: 100000;">        </p>
    </div>
</div>

<script src="../static/js/password_strength.js" defer ></script>
{% endblock %}
