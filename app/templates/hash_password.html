{% extends "layout.html" %}
{% block main %}

<!-- Navigation Bar -->
<nav>
    <span></span>
    <div>
        <a href="/" class="top-buttons" style="text-decoration: none;">Home</a>
        <button id="hp__key" class="top-buttons" style="text-decoration: none; font-size: 15px;">Help</button>
    </div>
</nav>

<!-- Password Hashing Form -->
<form action="/hash_password" method="post" class="reg_form">
    <br><br>
    
    <!-- Password Input Label -->
    <label class="pass-label">Hash Password:</label>
    <br><br>
    
    <!-- Password Input Field -->
    <input
        type="password"
        id="hp_password"
        name="password"
        placeholder="Your login Password"
        class="form-input"
        required
        autocomplete="off"
        autofocus
        title="Enter password to hash"
    >
    
    <!-- Password Visibility Toggle -->
    <span id="hp_toggle-Password" class="toggle-password" style="top: 39%;">Show</span>
    
    <!-- Hidden Algorithm Selection -->
    <input
        type="hidden"
        id="hp_hdn_algorithm"
        name="algorithm"
        value="SHA-256"
    >
    
    <br><br>
    
    <!-- Algorithm Selection Dropdown -->
    <div class="form-input, dropdown" style="width: 10px;">
        <button
            type="button"
            id="hp_algorithm"
            class="form-input form-button"
            style="width: 150px; height: 40px; text-align: left;"
        >
            Algorithm
        </button>
        <div id="hp_dropdown" class="dropdown-content">
            <div id="hp_opt1" class="dropdownOptions">SHA-224</div>
            <div id="hp_opt2" class="dropdownOptions">SHA-256</div>
            <div id="hp_opt3" class="dropdownOptions">SHA-384</div>
            <div id="hp_opt4" class="dropdownOptions">SHA-512</div>
        </div>
    </div>
    
    <br><br>
    
    <!-- Submit Button -->
    <input
        type="submit"
        value="Hash"
        id="hp_submitButton"
        class="form-button"
    >
</form>

<!-- Hash Result Display -->
{% if eval %}
<div class="glassmorphicHints" style="top: 20%; left: 10%; max-width: 700px; overflow-wrap: anywhere; padding: 10px;">
    <p style="color: rgb(0, 255, 255);">
        <h style="color: rgba(0, 255, 255, 0.288);">{{ eval[0] }}</h>{{ eval[1] }}
    </p>
</div>
{% endif %}

<!-- Script Import -->
<script src="../static/js/hash_password.js" defer></script>

{% endblock %}
