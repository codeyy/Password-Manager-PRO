<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Meta Information -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassVault</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../static/css/style.css">

  <!-- Favicon -->
  <link rel="icon" href="../static/images/favicon.ico" type="image/x-icon">
</head>

<body>
  <!-- Background glow effect -->
  <div id="glow"></div>

  <!-- Header with left wave animation -->
  <div class="page-header" style="justify-content: flex-start;">
    <div class="wave-container" style="justify-content: flex-start;">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <!-- Right wave animation -->
    <div class="wave-container" style="justify-content: flex-end;">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <!-- Header with right wave animation -->
  <div class="page-header" style="justify-content: flex-end; margin-right: 20px;">
    <div class="wave-container">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="wave-container">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <!-- Main content block -->
  {% block main %}
  {% endblock %}

  <!-- Indicator notification popup -->
  {% if indc %}
  <div id="indc" class="indcglassmorphicpopup">
    <h2 class="indch">{{ indc }}</h2>
  </div>
  {% endif %}

  <!-- Scripts -->
  <script src="../static/js/global.js" defer></script>
</body>

</html>
