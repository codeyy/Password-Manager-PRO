{% extends "logedout-layout.html" %}
{% block main %}

<nav>
    <span></span>
    <a href="/login" class="form-button" style="text-decoration: none; float: right; margin-right: 7vw">Login</a>
</nav>

<form method="POST" action="/register" class="reg_form">
    <input 
        type="text" 
        placeholder="Username" 
        id="reg-username" 
        name="username" 
        required 
        class="form-input"
        autocomplete="off" 
        title="Enter Username" 
        autofocus
    >
    <br><br>
    <input 
        type="password" 
        placeholder="Password" 
        id="reg-password" 
        name="password" 
        required 
        class="form-input"
        autocomplete="off"
    >
    <span 
        id="toggle-reg-Password" 
        class="toggle-password" 
        style="top: 33%;"
    >Show</span>
    <br>
    <div class="progress-container">
        <div class="progress-bar" style="width: 0%" id="progressBar"></div>
    </div>
    <br>
    <input 
        type="password" 
        placeholder="Re-enter Password" 
        id="re-reg-password" 
        name="re-password" 
        required
        class="form-input" 
        autocomplete="off"
    >
    <br><br>
    <input 
        type="submit" 
        value="Register" 
        class="form-button" 
        id="reg-button"
    >
</form>

<script src="../static/js/registration.js" defer ></script>

{% endblock %}
