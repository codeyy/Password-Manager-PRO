<!DOCTYPE html>
<html lang="en">

<head>
  <title>PassVault</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
      body {
          background-image: url('/static/BACKGROUND.jpg');
          background-size: cover;
          /* Scales the image to cover the entire element */
          background-position: center center;
          /* Centers the image */
          background-repeat: no-repeat;
          /* Prevents image tiling */
          background-attachment: fixed;
          /* Keeps the background image fixed during scrolling */
          position: relative;
          overflow: hidden;
        }
    </style>
</head>

<body>
  <div id="glow"></div>
  
    <h1 style="text-align: center; margin-top: 5vh; font-size: 5vw; color: white;"> SNAP! </h>
    <h2 style="text-align: center; margin-top: 20vh; font-size: 5vw; color: white;">{{ error }}</h1>
    <a href="/" style="display: block; text-align: center; margin-top: 5vh; font-size: 2vw; color: #00ffff; ">Go to Home</a>

</body>
<script>
  const glow = document.getElementById('glow');

  document.addEventListener('mousemove', (e) => {
    glow.style.top = e.clientY + 'px';
    glow.style.left = e.clientX + 'px';
  });
</script>
<script>
  const snowCount = 60; // Number of snowflakes
  for (let i = 0; i < snowCount; i++) {
    const snowflake = document.createElement('div');
    snowflake.classList.add('snowflake');
    snowflake.textContent = String.fromCharCode(Math.random() * 100); // Snowflake character
    snowflake.style.left = Math.random() * 100 + "vw";
    snowflake.style.zIndex = Math.floor(Math.random() - 1);
    snowflake.style.animationDuration = 5 + Math.random() * 10 + "s";
    snowflake.style.fontSize = 7 + Math.random() * 10 + "px";
    snowflake.style.animationDelay = Math.random() * 10 + "s";
    snowflake.style.color = "rgba(0, 255, 204, 0.733)";
    snowflake.style.opacity = 0.5;
    snowflake.style.zIndex = 1;
    document.body.appendChild(snowflake);
  }
</script>

</html>
